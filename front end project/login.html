<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-box">
  <h2>Welcome Back 👋</h2>
  <p>Login to continue</p>


  <form action="dashboard.html">

  <input 
      type="email" 
       placeholder="Email" 
       required
    >

  
  <input 
     type="password"
      placeholder="Password"
      required 
      minlength="6"
      >

 <button class="btn">Login</button>

  </form>

 
</div>

</body>
</html>
